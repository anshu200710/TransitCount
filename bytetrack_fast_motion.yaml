tracker_type: bytetrack
track_high_thresh: 0.20    # Lower threshold for fast-moving persons
track_low_thresh:  0.03    # Lower threshold for tentative tracks
new_track_thresh:  0.15    # Lower threshold for new tracks
track_buffer:      60      # Longer buffer to handle fast motion (~2 s @ 30 fps)
match_thresh:      0.75    # Lower IoU threshold for more lenient matching
fuse_score:        true    # fuse detection score into IoU cost
